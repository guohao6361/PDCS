server:
  port: ${SERVER_PORT:8083}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  cart:
    key-prefix: ${CART_KEY_PREFIX:cart:user:}
    ttl-days: ${CART_TTL_DAYS:7}
  jwt:
    secret: ${JWT_SECRET:myDefaultJwtSecretKeyForDevelopmentOnly123456}