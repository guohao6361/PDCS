server {
    listen 80;
    server_name localhost;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # API代理到后端微服务
    location /cart {
        proxy_pass http://cart-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /users {
        proxy_pass http://user-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /products {
        proxy_pass http://product-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /reviews {
        proxy_pass http://product-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /orders {
        proxy_pass http://order-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 文件存储代理到 user-service（user-service 内部从 MinIO 读取文件）
    location /files/ {
        proxy_pass http://user-service:80/users/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 允许跨域访问（前端需要加载图片）
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
    }

    # 所有其他请求返回index.html（支持前端路由）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
