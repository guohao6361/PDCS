apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: cart-service:v0
          ports:
            - containerPort: 8083
          env:
            - name: REDIS_HOST
              value: "redis-service"
            - name: JWT_SECRET
              value: "myDefaultJwtSecretKeyForDevelopmentOnly123456"
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
spec:
  selector:
    app: cart-service
  ports:
    - port: 80
      targetPort: 8083
