server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ecommerce}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:rootpassword}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}

app:
  jwt:
    secret: ${JWT_SECRET:myDefaultJwtSecretKeyForDevelopmentOnly123456}
    expiration: ${JWT_EXPIRATION:86400000}
  user:
    default-balance: ${USER_DEFAULT_BALANCE:1000.00}
    password-min-length: ${PASSWORD_MIN_LENGTH:6}