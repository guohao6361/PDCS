server:
  port: ${SERVER_PORT:8082}

spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/ecommerce}

app:
  product:
    default-size: ${PRODUCT_DEFAULT_SIZE:10}
  jwt:
    secret: ${JWT_SECRET:myDefaultJwtSecretKeyForDevelopmentOnly123456}

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin123456}
  bucket-name: ${MINIO_BUCKET_NAME:avatars}