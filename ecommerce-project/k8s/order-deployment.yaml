apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:v0
          ports:
            - containerPort: 8084
          env:
            - name: MYSQL_URL
              value: "jdbc:mysql://mysql-service:3306/ecommerce"
            - name: CART_SERVICE_URL
              value: "http://cart-service:80"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:80"
            - name: USER_SERVICE_URL
              value: "http://user-service:80"
            - name: JWT_SECRET
              value: "myDefaultJwtSecretKeyForDevelopmentOnly123456"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 80
      targetPort: 8084
