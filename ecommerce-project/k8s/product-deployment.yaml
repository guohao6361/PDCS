apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: product-service:v0
          ports:
            - containerPort: 8082
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb-service:27017/ecommerce"
            - name: JWT_SECRET
              value: "myDefaultJwtSecretKeyForDevelopmentOnly123456"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: 80
      targetPort: 8082